{% import 'macros.jinja' as macros with context %}

{{ macros.github_header() }}

jobs:
  build:
    name: "Build wheel for manylinux {{ manylinux_version }}"
    runs-on: ["self-hosted", "Linux", "ppc64le"]
    
    container:
      image: python:3.12-slim  # Specify the Docker image to use
      #options: --cpus 2  # You can customize container options (optional)

    env:
      # archery uses these environment variables
      
      ARCH: ppc64le
      ARCHERY_USE_DOCKER_CLI: 0
      #PYTHON: "{{ python_version }}"

    steps:
      - name: Install dependencies
        run: |

          apt-get update -y
          apt-get install -y sudo git curl libjpeg-dev zlib1g-dev python3-pip
          pip install -U pip

      {{ macros.github_checkout_arrow()|indent }}
      

      
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | bash -s -- -y
          echo 'source $HOME/.cargo/env' >> ~/.bashrc
          . $HOME/.cargo/env
          export PATH="$HOME/.cargo/bin:$PATH"
          rustc --version  # Check Rust version to confirm installation

      - name: Install Archery
        run: |
          pip install archery

      {{ macros.github_login_dockerhub()|indent }}
      - name: Build wheel
        shell: bash
        run: archery docker run -e SETUPTOOLS_SCM_PRETEND_VERSION={{ arrow.no_rc_version }} python-wheel-manylinux-{{ manylinux_version }}


      